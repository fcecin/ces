# cesweb — HTTPS (:443) reverse proxy to the local Node gateway, with :80 → :443
# redirect. TLS is REQUIRED, not cosmetic: the terminal signs in-browser with
# WebCrypto (crypto.subtle), which only exists in a secure context — so the
# browser-signing path simply doesn't run over plain HTTP. Cert from Let's
# Encrypt (certbot), auto-renewed; a renewal reloads nginx via certbot's deploy
# hook. A tiny-scale instrument: hard caps balk (503) rather than strain the box.
# Install as /etc/nginx/sites-available/cesweb, symlink into sites-enabled,
# remove the stock `default` site. Needs the cert present before nginx -t passes.
# @@DOMAIN@@ is the public hostname; deploy.sh substitutes it (DOMAIN=...) at
# ship time, so this file stays generic.

limit_conn_zone $binary_remote_addr zone=cesweb_perip:10m;
limit_req_zone  $binary_remote_addr zone=cesweb_req:10m rate=5r/s;

# HTTP → HTTPS. (certbot's nginx plugin inserts its ACME-challenge location above
# this redirect during renewal, so renewals keep working.)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name @@DOMAIN@@ _;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name @@DOMAIN@@;

    ssl_certificate     /etc/letsencrypt/live/@@DOMAIN@@/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/@@DOMAIN@@/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:cesweb_ssl:5m;

    # Per-IP concurrency + request-rate caps. Over either limit → 503. (cesweb's
    # own MAX_INFLIGHT no longer 503s — it QUEUES extra fills and serves a live
    # sitrep page — so these nginx limits are the only 503 source now.)
    limit_conn   cesweb_perip 8;
    limit_req    zone=cesweb_req burst=10 nodelay;
    limit_conn_status 503;
    limit_req_status  503;

    client_max_body_size 1m;          # GET-only gateway; nothing big inbound
    proxy_connect_timeout 5s;
    # The responder always answers immediately (ready file, or a sitrep page
    # while the engine fetches in the background), so this no longer fires on a
    # cold large-file fetch the way the old blocking gateway's did.
    proxy_read_timeout    30s;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web terminal (dev tools): forward the WebSocket upgrade (now wss://, on
    # /dev/dial) and let interactive sessions stay open (cesweb's own
    # idle/lifetime caps bound them, not nginx). Also covers the /dev/dial page.
    location /dev/dial {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
    }
}
